<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTR - DBAMINHS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--o:#E85D1A;--od:#C44A10;--n:#1B2A4A;--w:#FFF;--g1:#F7F5F2;--g2:#EDE9E3;--g5:#8A8477;--g9:#1A1815;--su:#2D8B46;--da:#D32F2F;--fb:'Source Sans 3','Segoe UI',sans-serif;--fd:'Playfair Display',Georgia,serif}
body{font-family:var(--fb);background:var(--g1);min-height:100vh;color:var(--g9)}
.header{background:var(--n);color:var(--w);padding:16px 20px;text-align:center}
.header h1{font-family:var(--fd);font-size:20px;margin-bottom:2px}
.header p{font-size:12px;opacity:.6}
.container{max-width:500px;margin:20px auto;padding:0 16px}
.card{background:var(--w);border-radius:16px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:16px}
.card h2{font-family:var(--fd);font-size:18px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:var(--fb);transition:all .2s;width:100%}
.btn-p{background:var(--o);color:var(--w)}.btn-p:hover{background:var(--od)}
.btn-g{background:var(--su);color:var(--w)}.btn-g:hover{background:#247a3b}
.btn-s{background:var(--g1);color:var(--g9);border:1.5px solid var(--g2)}
.fg{margin-bottom:14px}.fg label{display:block;font-size:13px;font-weight:600;color:#666;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:12px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:15px;font-family:var(--fb)}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--o)}
.time-display{text-align:center;padding:20px;background:var(--g1);border-radius:12px;margin-bottom:16px}
.time-display .time{font-size:48px;font-weight:700;color:var(--n);font-family:var(--fd)}
.time-display .date{font-size:14px;color:var(--g5);margin-top:4px}
.status{text-align:center;padding:16px;border-radius:12px;margin-bottom:16px;font-weight:600}
.status.success{background:#E8F5EC;color:var(--su)}
.status.error{background:#FDECEA;color:var(--da)}
.status.info{background:#E3F2FD;color:#2A7AB5}
.record{display:flex;justify-content:space-between;padding:12px;background:var(--g1);border-radius:8px;margin-bottom:8px;align-items:center}
.record .label{font-size:13px;color:var(--g5)}.record .value{font-weight:700;font-size:15px}
.scan-area{text-align:center;padding:20px;border:2px dashed var(--g2);border-radius:12px;margin-bottom:16px}
#qrVideo{width:100%;max-width:300px;border-radius:12px;display:none}
.tab-nav{display:flex;gap:4px;margin-bottom:16px;background:var(--g1);border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;color:var(--g5)}
.tab-btn.act{background:var(--w);color:var(--o);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.history-item{padding:14px;border-bottom:1px solid var(--g1)}
.history-item:last-child{border:none}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">
<h1>&#128336; Daily Time Record</h1>
<p>DBAMINHS Employee DTR System</p>
</div>

<div class="container">

<!-- LOGIN -->
<div id="dtrLogin" class="card">
<h2>&#128100; Employee Login</h2>
<div class="fg"><label>Employee ID</label><input id="dtrEid" placeholder="e.g. T-2024-001"></div>
<div class="fg"><label>PIN Code</label><input id="dtrPin" type="password" placeholder="4-digit PIN" maxlength="6"></div>
<button class="btn btn-p" onclick="dtrLogin()">Login &#10148;</button>
<p style="text-align:center;margin-top:12px;font-size:12px;color:var(--g5)">First time? Use your Employee ID and default PIN: 1234</p>
</div>

<!-- MAIN DTR -->
<div id="dtrMain" class="hidden">

<div class="time-display">
<div class="time" id="liveTime">00:00:00</div>
<div class="date" id="liveDate"></div>
</div>

<div id="dtrStatus"></div>

<div class="card">
<h2 id="dtrGreeting">Good morning!</h2>
<p style="color:var(--g5);margin-bottom:16px" id="dtrEmployeeName"></p>

<div class="tab-nav">
<button class="tab-btn act" onclick="dtrTab(this,'tabTimein')">&#128336; Time In/Out</button>
<button class="tab-btn" onclick="dtrTab(this,'tabHistory')">&#128203; History</button>
<button class="tab-btn" onclick="dtrTab(this,'tabSettings')">&#9881; Settings</button>
</div>

<!-- TIME IN/OUT TAB -->
<div id="tabTimein">
<div id="todayRecord" style="margin-bottom:16px"></div>

<div id="scanSection">
<div class="scan-area">
<p style="font-size:14px;color:var(--g5);margin-bottom:12px">Scan the QR code displayed at the school entrance</p>
<video id="qrVideo" playsinline></video>
<canvas id="qrCanvas" class="hidden"></canvas>
<div id="scanResult"></div>
</div>
<button class="btn btn-p" id="scanBtn" onclick="startScan()">&#128247; Scan QR Code</button>
<button class="btn btn-s hidden" id="stopBtn" onclick="stopScan()" style="margin-top:8px">Stop Camera</button>
</div>

<div id="manualSection" style="margin-top:12px">
<p style="text-align:center;font-size:12px;color:var(--g5);margin-bottom:8px">Or enter QR code manually:</p>
<div style="display:flex;gap:8px">
<input id="manualCode" placeholder="Enter today's code" style="flex:1;padding:10px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:var(--fb)">
<button class="btn btn-p" style="width:auto;padding:10px 18px" onclick="verifyCode(document.getElementById('manualCode').value)">Submit</button>
</div>
</div>
</div>

<!-- HISTORY TAB -->
<div id="tabHistory" class="hidden">
<div id="dtrHistoryList"></div>
</div>

<!-- SETTINGS TAB -->
<div id="tabSettings" class="hidden">
<div class="fg"><label>Change PIN</label><input id="newPin" type="password" placeholder="New 4-digit PIN" maxlength="6"></div>
<div class="fg"><label>Confirm PIN</label><input id="confirmPin" type="password" placeholder="Confirm PIN" maxlength="6"></div>
<button class="btn btn-p" onclick="changePin()">Update PIN</button>
<button class="btn btn-s" style="margin-top:8px" onclick="dtrLogout()">&#9211; Logout</button>
</div>

</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-data.js"></script>
<script>
// School coordinates (DBAMINHS - Brgy. Lalayat, San Jose, Batangas)
var SCHOOL_LAT = 13.8783;
var SCHOOL_LNG = 121.1068;
var SCHOOL_RADIUS = 200; // meters

var currentEmployee = null;
var videoStream = null;

// Live clock
function updateClock() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12 || 12;
  document.getElementById('liveTime').textContent = 
    (h12<10?'0':'')+h12 + ':' + (m<10?'0':'')+m + ':' + (s<10?'0':'')+s + ' ' + ampm;
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('liveDate').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// Greeting based on time
function getGreeting() {
  var h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

// DTR Login
function dtrLogin() {
  var eid = document.getElementById('dtrEid').value.trim();
  var pin = document.getElementById('dtrPin').value.trim();
  if (!eid) { alert('Enter Employee ID'); return; }
  
  loadAllFromFirebase(function() {
    var employees = loadData('dtr_employees', {});
    var emp = employees[eid];
    
    if (!emp) {
      // First time - register with default PIN
      if (pin === '1234' || pin === '') {
        employees[eid] = {name: eid, pin: '1234', registered: new Date().toISOString()};
        saveData('dtr_employees', employees);
        currentEmployee = {id: eid, name: eid};
        showDTR();
        showStatus('Welcome! Please change your default PIN in Settings.', 'info');
        return;
      }
      alert('Employee not found. Use default PIN 1234 for first login.');
      return;
    }
    
    if (emp.pin && emp.pin !== pin) {
      alert('Incorrect PIN');
      return;
    }
    
    currentEmployee = {id: eid, name: emp.name || eid};
    showDTR();
  });
}

function showDTR() {
  document.getElementById('dtrLogin').classList.add('hidden');
  document.getElementById('dtrMain').classList.remove('hidden');
  document.getElementById('dtrGreeting').textContent = getGreeting() + '!';
  document.getElementById('dtrEmployeeName').textContent = currentEmployee.name + ' (' + currentEmployee.id + ')';
  loadTodayRecord();
  loadHistory();
}

function dtrLogout() {
  currentEmployee = null;
  document.getElementById('dtrMain').classList.add('hidden');
  document.getElementById('dtrLogin').classList.remove('hidden');
  document.getElementById('dtrEid').value = '';
  document.getElementById('dtrPin').value = '';
  stopScan();
}

// Get today's key
function getTodayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1<10?'0':'') + (d.getMonth()+1) + '-' + (d.getDate()<10?'0':'') + d.getDate();
}

// Load today's record
function loadTodayRecord() {
  var key = 'dtr_' + getTodayKey();
  var records = loadData(key, {});
  var rec = records[currentEmployee.id];
  var el = document.getElementById('todayRecord');
  
  if (!rec) {
    el.innerHTML = '<div class="record"><span class="label">Status</span><span class="value" style="color:var(--da)">Not yet timed in</span></div>';
    return;
  }
  
  var html = '';
  if (rec.timeIn) {
    html += '<div class="record"><span class="label">&#128994; Time In</span><span class="value" style="color:var(--su)">' + rec.timeIn + '</span></div>';
  }
  if (rec.timeOut) {
    html += '<div class="record"><span class="label">&#128308; Time Out</span><span class="value" style="color:var(--da)">' + rec.timeOut + '</span></div>';
    // Calculate hours
    var inParts = rec.timeIn.match(/(\d+):(\d+):(\d+)/);
    var outParts = rec.timeOut.match(/(\d+):(\d+):(\d+)/);
    if (inParts && outParts) {
      var inMin = parseInt(inParts[1])*60 + parseInt(inParts[2]);
      var outMin = parseInt(outParts[1])*60 + parseInt(outParts[2]);
      var diff = outMin - inMin;
      var hours = Math.floor(diff/60);
      var mins = diff % 60;
      html += '<div class="record"><span class="label">&#9200; Total Hours</span><span class="value">' + hours + 'h ' + mins + 'm</span></div>';
    }
  }
  
  el.innerHTML = html;
}

// GPS Check
function checkGPS() {
  return new Promise(function(resolve, reject) {
    if (!navigator.geolocation) {
      reject('GPS not supported');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var distance = getDistance(lat, lng, SCHOOL_LAT, SCHOOL_LNG);
        if (distance <= SCHOOL_RADIUS) {
          resolve({lat: lat, lng: lng, distance: Math.round(distance)});
        } else {
          reject('You are ' + Math.round(distance) + 'm away from school. Must be within ' + SCHOOL_RADIUS + 'm.');
        }
      },
      function(err) {
        reject('GPS error: Please enable location services.');
      },
      {enableHighAccuracy: true, timeout: 10000}
    );
  });
}

function getDistance(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Verify QR code and record time
function verifyCode(code) {
  if (!code) { showStatus('Enter or scan the QR code.', 'error'); return; }
  
  var todayCode = loadData('dtr_daily_code', {});
  var today = getTodayKey();
  
  if (!todayCode.code || todayCode.date !== today) {
    showStatus('No QR code generated for today. Contact admin.', 'error');
    return;
  }
  
  if (code.trim() !== todayCode.code) {
    showStatus('Invalid QR code. Please scan the correct code.', 'error');
    return;
  }
  
  showStatus('QR verified! Checking GPS location...', 'info');
  
  checkGPS().then(function(loc) {
    recordTime(loc);
  }).catch(function(err) {
    showStatus(err, 'error');
  });
}

function recordTime(location) {
  var key = 'dtr_' + getTodayKey();
  var records = loadData(key, {});
  var rec = records[currentEmployee.id] || {};
  var now = new Date();
  var timeStr = (now.getHours()<10?'0':'') + now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes() + ':' + (now.getSeconds()<10?'0':'') + now.getSeconds();
  
  if (!rec.timeIn) {
    rec.timeIn = timeStr;
    rec.locationIn = location;
    showStatus('&#10003; TIME IN recorded at ' + timeStr + '!', 'success');
  } else if (!rec.timeOut) {
    rec.timeOut = timeStr;
    rec.locationOut = location;
    showStatus('&#10003; TIME OUT recorded at ' + timeStr + '!', 'success');
  } else {
    showStatus('Already timed in and out today.', 'info');
    return;
  }
  
  rec.name = currentEmployee.name;
  records[currentEmployee.id] = rec;
  saveData(key, records);
  loadTodayRecord();
  stopScan();
}

function showStatus(msg, type) {
  var el = document.getElementById('dtrStatus');
  el.innerHTML = '<div class="status ' + type + '">' + msg + '</div>';
  if (type === 'success' || type === 'info') {
    setTimeout(function() { el.innerHTML = ''; }, 5000);
  }
}

// QR Scanner using camera
function startScan() {
  var video = document.getElementById('qrVideo');
  video.style.display = 'block';
  document.getElementById('scanBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  
  navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
    .then(function(stream) {
      videoStream = stream;
      video.srcObject = stream;
      video.play();
      scanQR();
    })
    .catch(function(err) {
      showStatus('Camera error: ' + err.message + '. Use manual code entry.', 'error');
      stopScan();
    });
}

function stopScan() {
  var video = document.getElementById('qrVideo');
  video.style.display = 'none';
  document.getElementById('scanBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
  if (videoStream) {
    videoStream.getTracks().forEach(function(t) { t.stop(); });
    videoStream = null;
  }
}

function scanQR() {
  if (!videoStream) return;
  var video = document.getElementById('qrVideo');
  var canvas = document.getElementById('qrCanvas');
  var ctx = canvas.getContext('2d');
  
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    // Note: For full QR scanning, would need a library like jsQR
    // For now, rely on manual entry
  }
  requestAnimationFrame(scanQR);
}

// History
function loadHistory() {
  var el = document.getElementById('dtrHistoryList');
  if (!el) return;
  
  var html = '<h3 style="font-size:15px;margin-bottom:12px">Recent Records</h3>';
  var found = false;
  var keys = Object.keys(_cache).filter(function(k) { return k.startsWith('dtr_2'); }).sort().reverse();
  
  keys.slice(0, 30).forEach(function(key) {
    var records = _cache[key];
    if (!records || !records[currentEmployee.id]) return;
    found = true;
    var rec = records[currentEmployee.id];
    var date = key.replace('dtr_', '');
    html += '<div class="history-item">';
    html += '<div style="font-weight:600;font-size:14px;margin-bottom:4px">' + date + '</div>';
    html += '<div style="display:flex;gap:16px;font-size:13px">';
    html += '<span style="color:var(--su)">In: ' + (rec.timeIn || '--') + '</span>';
    html += '<span style="color:var(--da)">Out: ' + (rec.timeOut || '--') + '</span>';
    html += '</div></div>';
  });
  
  if (!found) html += '<div style="text-align:center;padding:20px;color:var(--g5)">No records yet.</div>';
  el.innerHTML = html;
}

// Change PIN
function changePin() {
  var newPin = document.getElementById('newPin').value;
  var confirm = document.getElementById('confirmPin').value;
  if (!newPin || newPin.length < 4) { alert('PIN must be at least 4 digits'); return; }
  if (newPin !== confirm) { alert('PINs do not match'); return; }
  
  var employees = loadData('dtr_employees', {});
  if (employees[currentEmployee.id]) {
    employees[currentEmployee.id].pin = newPin;
    saveData('dtr_employees', employees);
    document.getElementById('newPin').value = '';
    document.getElementById('confirmPin').value = '';
    showStatus('PIN updated successfully!', 'success');
  }
}

// Tab switching
function dtrTab(el, id) {
  el.parentElement.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('act')});
  el.classList.add('act');
  ['tabTimein','tabHistory','tabSettings'].forEach(function(t) {
    document.getElementById(t).classList.toggle('hidden', t !== id);
  });
  if (id === 'tabHistory') loadHistory();
}

// Init
loadAllFromFirebase(function() { console.log('DTR Firebase loaded!'); });
</script>
</body>
</html>
